# Nginx site config for Mercy Seat Ministries on msmokc.org (official domain).
#
# Assumptions:
# - The Deno app runs locally on 127.0.0.1:8005.
# - A Let's Encrypt certificate already exists for msmokc.org and www.msmokc.org.
#   If it does not, create one before enabling this file, for example:
#   sudo certbot certonly --standalone -d msmokc.org -d www.msmokc.org
#
# Install example:
#   sudo mkdir -p /var/www/letsencrypt
#   sudo cp deploy/nginx/msm.com.conf /etc/nginx/sites-available/msmokc.org.conf
#   sudo ln -s /etc/nginx/sites-available/msmokc.org.conf /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx

upstream msm_web_app {
    server 127.0.0.1:8005;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name msmokc.org www.msmokc.org;

    # Keep this path available for Let's Encrypt HTTP-01 renewals.
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://msmokc.org$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.msmokc.org;

    # --- TLS certificate (issued by certbot) ---
    ssl_certificate     /etc/letsencrypt/live/msmokc.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/msmokc.org/privkey.pem;

    # Do not advertise the nginx version in responses or error pages.
    server_tokens off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    return 301 https://msmokc.org$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name msmokc.org;

    # --- TLS certificate (issued by certbot) ---
    ssl_certificate     /etc/letsencrypt/live/msmokc.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/msmokc.org/privkey.pem;

    # Do not advertise the nginx version in responses or error pages.
    server_tokens off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Allow Sunday School PDF uploads (the app caps lessons at 25 MB).
    client_max_body_size 30m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    location / {
        proxy_pass http://msm_web_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Connection "";
        proxy_redirect off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
